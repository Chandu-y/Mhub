# ==================================================
# NGINX Load Balancer Configuration for MHub
# ==================================================
# This config distributes traffic across multiple 
# Node.js instances for 10 lakh+ concurrent users
# ==================================================

# Upstream configuration - list of Node.js servers
upstream mhub_backend {
    # Load balancing method: least_conn is best for API servers
    least_conn;
    
    # Node.js servers (PM2 cluster or separate instances)
    server 127.0.0.1:5000 weight=5 max_fails=3 fail_timeout=30s;
    server 127.0.0.1:5001 weight=5 max_fails=3 fail_timeout=30s;
    server 127.0.0.1:5002 weight=5 max_fails=3 fail_timeout=30s;
    server 127.0.0.1:5003 weight=5 max_fails=3 fail_timeout=30s;
    
    # Add more servers as needed for scaling
    # server backend2.mhub.com:5000 weight=5;
    # server backend3.mhub.com:5000 weight=5;
    
    # Keep-alive connections for better performance
    keepalive 64;
}

# Frontend static files upstream (optional)
upstream mhub_frontend {
    server 127.0.0.1:8081;
    keepalive 16;
}

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/s;
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/s;
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

# Cache settings
proxy_cache_path /var/cache/nginx/mhub levels=1:2 keys_zone=mhub_cache:100m max_size=1g inactive=60m use_temp_path=off;

# Main server block
server {
    listen 80;
    listen [::]:80;
    server_name mhub.com www.mhub.com;
    
    # Redirect HTTP to HTTPS
    return 301 https://$server_name$request_uri;
}

# HTTPS server block
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name mhub.com www.mhub.com;
    
    # SSL configuration
    ssl_certificate /etc/ssl/certs/mhub.com.crt;
    ssl_certificate_key /etc/ssl/private/mhub.com.key;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_session_tickets off;
    
    # Modern SSL configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    
    # HSTS
    add_header Strict-Transport-Security "max-age=63072000" always;
    
    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml;
    
    # Connection limits
    limit_conn conn_limit 50;
    
    # ==================================================
    # API ROUTES - Proxy to Node.js backend
    # ==================================================
    location /api/ {
        # Rate limiting for API
        limit_req zone=api_limit burst=50 nodelay;
        
        # Proxy settings
        proxy_pass http://mhub_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        
        # Timeouts
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
        
        # Buffer settings for large responses
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 16k;
        proxy_busy_buffers_size 24k;
    }
    
    # Cache feed endpoint for burst traffic
    location /api/posts/for-you {
        limit_req zone=api_limit burst=100 nodelay;
        
        proxy_pass http://mhub_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        
        # Enable caching for this endpoint
        proxy_cache mhub_cache;
        proxy_cache_valid 200 5s;  # Cache successful responses for 5 seconds
        proxy_cache_key "$request_uri";
        add_header X-Cache-Status $upstream_cache_status;
    }
    
    # Stricter rate limit for auth endpoints
    location /api/auth/ {
        limit_req zone=auth_limit burst=5 nodelay;
        
        proxy_pass http://mhub_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
    
    # ==================================================
    # STATIC FILES - Frontend
    # ==================================================
    location / {
        proxy_pass http://mhub_frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        
        # Try files first, then proxy
        # root /var/www/mhub/client/dist;
        # try_files $uri $uri/ /index.html;
    }
    
    # Static asset caching
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        
        # Serve from frontend
        proxy_pass http://mhub_frontend;
    }
    
    # ==================================================
    # HEALTH CHECK ENDPOINT
    # ==================================================
    location /health {
        access_log off;
        proxy_pass http://mhub_backend;
        proxy_connect_timeout 2s;
        proxy_read_timeout 2s;
    }
    
    # ==================================================
    # WEBSOCKET SUPPORT (for real-time features)
    # ==================================================
    location /socket.io/ {
        proxy_pass http://mhub_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        
        # WebSocket specific timeouts
        proxy_connect_timeout 7d;
        proxy_send_timeout 7d;
        proxy_read_timeout 7d;
    }
    
    # Error pages
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
